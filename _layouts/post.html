---
layout: default
---
<div class="hl-page">
<div class="hl-post-header">
  <div class="hl-post-header__eyebrow">
    {% if page.path contains "hunting-detections" %}
      <span class="hl-post-header__badge hl-post-header__badge--detect">Detection Rules</span>
    {% else %}
      <span class="hl-post-header__badge hl-post-header__badge--report">{{ page.category | default: "Malware Analysis" }}</span>
    {% endif %}
    <span class="hl-post-header__sep">·</span>
    <span class="hl-post-header__date">{{ page.date | date: "%B %d, %Y" }}</span>
  </div>
  <h1 class="hl-post-header__title">{{ page.title }}</h1>
</div>
<div class="hl-post-body">
  <div class="hl-post-content">
    {{ content }}
  </div>
  <aside class="hl-post-toc" id="hl-toc" aria-label="Table of contents">
    <div class="hl-post-toc__heading">Contents</div>
    <nav><ul class="hl-toc__list" id="hl-toc-list"></ul></nav>
  </aside>
</div>
</div>


<script>
(function () {
  var content = document.querySelector('.hl-post-content');
  if (!content) return;

  // --- Reading progress bar (vertical, left margin) ---
  var progressTrack = document.createElement('div');
  progressTrack.className = 'hl-progress-track';
  document.body.appendChild(progressTrack);
  var progressBar = document.createElement('div');
  progressBar.className = 'hl-progress-bar';
  document.body.appendChild(progressBar);
  var navH    = (document.querySelector('.hl-nav') || {}).offsetHeight || 96;
  var trackH  = window.innerHeight - navH;
  function updateBar() {
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
    var pageH     = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    var total     = pageH - window.innerHeight;
    var px        = total > 0 ? Math.round((scrollTop / total) * trackH) : 0;
    progressBar.style.height = Math.min(px, trackH) + 'px';
  }
  window.addEventListener('scroll', updateBar, { passive: true });
  window.addEventListener('resize', function () {
    trackH = window.innerHeight - navH;
    updateBar();
  }, { passive: true });

  // --- Estimated read time ---
  var words   = content.textContent.trim().split(/\s+/).length;
  var minutes = Math.max(1, Math.round(words / 200));
  var eyebrow = document.querySelector('.hl-post-header__eyebrow');
  if (eyebrow) {
    var rt = document.createElement('span');
    rt.className = 'hl-read-time';
    rt.textContent = minutes + ' min read';
    eyebrow.appendChild(rt);
  }

  // --- Copy buttons on code blocks ---
  content.querySelectorAll('pre').forEach(function (pre) {
    var btn = document.createElement('button');
    btn.className = 'hl-copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function () {
      var code = pre.querySelector('code');
      var text = code ? code.textContent : pre.textContent;
      navigator.clipboard.writeText(text).then(function () {
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = 'Copy'; }, 2000);
      }).catch(function () {
        btn.textContent = 'Error';
        setTimeout(function () { btn.textContent = 'Copy'; }, 2000);
      });
    });
    pre.appendChild(btn);
  });

  // --- TOC + heading permalink anchors ---
  var tocList = document.getElementById('hl-toc-list');
  var toc     = document.getElementById('hl-toc');
  if (!tocList || !toc) return;

  var headings = Array.from(content.querySelectorAll('h2'));
  if (headings.length < 3) { toc.style.display = 'none'; return; }

  var linkIconSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
  var tocIconSVG  = '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';

  headings.forEach(function (h, i) {
    if (!h.id) h.id = 'toc-' + i;

    // Capture text before appending anchor so TOC stays clean
    var labelText = h.textContent.replace(/^[\d.]+\s*/, '').trim();

    // TOC entry
    var li = document.createElement('li');
    li.className = 'hl-toc__item';
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = labelText;
    li.appendChild(a);

    // TOC copy-link button (hover-reveal, right edge)
    var tocBtn = document.createElement('button');
    tocBtn.className = 'hl-toc__copy-btn';
    tocBtn.innerHTML = tocIconSVG;
    tocBtn.title = 'Copy link to section';
    tocBtn.setAttribute('aria-label', 'Copy link to this section');
    tocBtn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var url = location.href.split('#')[0] + '#' + h.id;
      navigator.clipboard.writeText(url).then(function () {
        tocBtn.textContent = '✓';
        setTimeout(function () { tocBtn.innerHTML = tocIconSVG; }, 1500);
      }).catch(function () {});
    });
    li.appendChild(tocBtn);
    tocList.appendChild(li);

    // Permalink anchor appended after text capture
    var anchor = document.createElement('a');
    anchor.className = 'hl-heading-anchor';
    anchor.href = '#' + h.id;
    anchor.innerHTML = linkIconSVG;
    anchor.setAttribute('aria-label', 'Copy link to this section');
    anchor.setAttribute('data-tip', 'Copy link to section');
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      history.pushState(null, null, '#' + h.id);
      h.scrollIntoView({ behavior: 'smooth' });
      navigator.clipboard.writeText(location.href).then(function () {
        anchor.textContent = '✓';
        anchor.setAttribute('data-tip', 'Copied!');
        setTimeout(function () {
          anchor.innerHTML = linkIconSVG;
          anchor.setAttribute('data-tip', 'Copy link to section');
        }, 1500);
      }).catch(function () {});
    });
    h.appendChild(anchor);
  });

  // Scroll-spy with TOC auto-scroll
  var links = Array.from(tocList.querySelectorAll('a'));
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        links.forEach(function (a) { a.classList.remove('hl-toc__active'); });
        var active = tocList.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) {
          active.classList.add('hl-toc__active');
          active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    });
  }, { rootMargin: '-8% 0% -80% 0%' });

  headings.forEach(function (h) { observer.observe(h); });

  // --- Section tip toast (once per browser session) ---
  if (sessionStorage.getItem('hl-section-tip')) return;
  sessionStorage.setItem('hl-section-tip', '1');
  var toast = document.createElement('div');
  toast.className = 'hl-toast';
  var tLabel = document.createElement('span');
  tLabel.className = 'hl-toast__label';
  tLabel.textContent = 'Tip';
  toast.appendChild(tLabel);
  var tMsg = document.createElement('span');
  tMsg.textContent = 'Click any section heading to copy a shareable link — save and bookmark your current spot to return to later!';
  toast.appendChild(tMsg);
  var tClose = document.createElement('button');
  tClose.className = 'hl-toast__close';
  tClose.textContent = '×';
  tClose.setAttribute('aria-label', 'Dismiss');
  toast.appendChild(tClose);
  document.body.appendChild(toast);

  var toastTimer;
  function dismissToast() {
    clearTimeout(toastTimer);
    toast.classList.remove('hl-toast--visible');
    setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
  }
  tClose.addEventListener('click', dismissToast);
  setTimeout(function () { toast.classList.add('hl-toast--visible'); }, 1500);
  toastTimer = setTimeout(dismissToast, 11500);

})();
</script>
