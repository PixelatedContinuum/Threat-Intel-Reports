tiers:
  - id: monthly
    name: Monthly Sponsor
    price: "$500 / month"
    annual_price: "$5,000 / year"
    description: "Site-wide branded presence. Logo in the site footer visible to every visitor, plus a Sponsored-by banner on every report published during the sponsorship month."
    benefits:
      - "Logo and tagline in the site footer, visible across every page"
      - "Sponsored-by banner on every report published in the month"
      - "Featured listing on this page under the Monthly tier"
      - "Two dedicated LinkedIn or X posts per month"
      - "Mention in every subscriber email during the period"
      - "Monthly readership report"
    best_fit: "Sponsors seeking flagship site-wide presence and inclusion in every piece of content published during the term."
    slots: 3
  - id: multi-report
    name: Multi-Report Sponsor
    price: "$750"
    price_note: "six new reports"
    evergreen_price: "$565"
    evergreen_price_note: "six evergreen reports (25% off)"
    description: "Six-report placement bundle. Six newly published reports at $750, or six evergreen reports from the catalog at $565 — a 25% discount. Mix-and-match arrangements available on request."
    benefits:
      - "Sponsored-by banner on all six reports for the life of the publication"
      - "Choice of six consecutive new reports, evergreen reports from the catalog, or a custom mix"
      - "Featured listing on this page under the Multi-Report tier"
      - "One dedicated LinkedIn post during the bundle period"
      - "Subscriber email mention with each new report; dedicated post for evergreen reports"
    best_fit: "Sponsors building sustained presence across a research arc, aligning with a campaign theme spanning multiple investigations, or attaching their brand to a curated set of evergreen reports."
    slots: 2
  - id: report
    name: Report Sponsor
    price: "$150"
    price_note: "new report"
    evergreen_price: "$115"
    evergreen_price_note: "evergreen report (25% off)"
    description: "Single-report placement. Pick a newly published report at $150 (full launch promo) or an evergreen report from the catalog at $115 — a 25% discount. Evergreen reports continue drawing search traffic and reader returns long after publication."
    benefits:
      - "Sponsored-by banner at the top of the report"
      - "Logo and link to your site or a chosen landing page"
      - "Mention in social posts referencing the report (LinkedIn, X)"
      - "Subscriber email mention (new reports) or a dedicated post highlighting the new sponsor (evergreen reports)"
      - "Featured listing on this page under the Report Sponsor tier"
      - "Permanent placement for the life of the report"
    best_fit: "Sponsors testing the audience, aligning with a specific research topic, or attaching their brand to an evergreen report that continues drawing readers."
    slots: 3

