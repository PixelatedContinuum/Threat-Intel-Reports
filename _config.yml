# SITE CONFIGURATION
baseurl: ""
url: "https://the-hunters-ledger.com"

# THEME-SPECIFIC CONFIGURATION
title: The Hunter's Ledger
description: "Threat Intelligence Reports and Hunting Resources"

favicon: "/assets/images/favicon.svg"

# Header and footer text
header_text: The Hunter's Ledger
header_feature_image: /assets/images/header.png
header_feature_image_responsive: true
footer_text: Threat Intel by The Hunter’s Ledger

# Blog / Post settings
excerpt: true
post_navigation: true
color_image: /assets/images/lineart.png
color_theme: dark

# Features
katex: true
mermaid: default
google_analytics:
cookie_consent: false

# PAGINATION
paginate: 5
#paginate_path: "/blog/page:num"

# BUILD SETTINGS
sass:
  style: compressed
  quiet_deps: true

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-paginate

# Serve /.well-known/ (RFC 9116 security.txt). Jekyll drops dot-directories
# from the build unless they are explicitly included.
include:
  - ".well-known"

exclude:
  - ".jekyll-cache"
  - ".jekyll-metadata"
  - ".idea"
  - "vendor/*"
  - "assets/node_modules/*"
  - ".github/*"
  - "docs/*"
  - "tools/*"

# Theme activation
remote_theme: sylhare/Type-on-Strap

# Section default link-preview card (og:image via page.thumbnail in head.liquid)
# for the behind-the-reports editorial pages. Deliverable pages set their own
# thumbnail explicitly: each report AND its detection page use the campaign's
# report card; listing/landing pages use their own hub card.
defaults:
  - scope:
      path: "behind-the-reports"
    values:
      thumbnail: /assets/images/cards/behind-the-reports.png