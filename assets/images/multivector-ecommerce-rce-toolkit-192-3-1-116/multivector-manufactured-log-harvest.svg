<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="1500" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="1499" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="62" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">Manufacturing the Evidence</text>
  <text x="500" y="106" text-anchor="middle" font-size="24" fill="#f5f5f5">Log verbosity raised to create data, then read back</text>
  <text x="500" y="140" text-anchor="middle" font-size="18" fill="#cccccc">The standout technique of this campaign and its best detection opportunity</text>
  <line x1="60" y1="166" x2="940" y2="166" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== STEP 1 — ORANGE: initial access =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="196" width="880" height="230" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="196" width="880" height="46" rx="8" fill="#f97316"/>
    <rect x="60" y="229" width="880" height="13" fill="#f97316"/>
    <text x="80" y="227" font-size="17" font-weight="700" fill="#111111" letter-spacing="0.5">STEP 1</text>
    <text x="200" y="227" font-size="23" font-weight="600" fill="#111111">Reach the management interface</text>
    <text x="80" y="286" font-size="21" fill="#ffffff">An externally reachable Jolokia/JMX endpoint with no access restriction</text>
    <text x="80" y="320" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">POST /jolokia  ·  operation: setProperty</text>
    <text x="80" y="354" font-size="18" fill="#e5e5e5">Requires no exploit and no credential, only reachability</text>
    <text x="80" y="390" font-size="18" fill="#fb923c" font-weight="600">Any external write operation to a management interface is abnormal</text>
  </g>
  <line x1="500" y1="426" x2="500" y2="466" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STEP 2 — RED: operator action =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="472" width="880" height="230" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="472" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="505" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="503" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STEP 2</text>
    <text x="200" y="503" font-size="23" font-weight="600" fill="#ffffff">Elevate log verbosity</text>
    <text x="80" y="562" font-size="21" fill="#ffffff">An application logger raised to DEBUG, and an HTTP client</text>
    <text x="80" y="592" font-size="21" fill="#ffffff">set to FULL body logging</text>
    <text x="80" y="628" font-size="18" fill="#e5e5e5">A configuration change, not an exploit. Nothing is compromised at this point</text>
    <text x="80" y="664" font-size="18" fill="#fb923c" font-weight="600">Alert on remote log-level changes, they are rare and rarely instrumented</text>
  </g>
  <line x1="500" y1="702" x2="500" y2="742" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STEP 3 — YELLOW: data creation =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="748" width="880" height="230" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="748" width="880" height="46" rx="8" fill="#eab308"/>
    <rect x="60" y="781" width="880" height="13" fill="#eab308"/>
    <text x="80" y="779" font-size="17" font-weight="700" fill="#111111" letter-spacing="0.5">STEP 3</text>
    <text x="200" y="779" font-size="23" font-weight="600" fill="#111111">The application writes the data itself</text>
    <text x="80" y="838" font-size="21" fill="#ffffff">Full request and response bodies, now including customer records,</text>
    <text x="80" y="868" font-size="21" fill="#ffffff">land in the log file</text>
    <text x="80" y="904" font-size="18" fill="#e5e5e5">The sensitive data did not exist in the log before the operator asked for it</text>
    <text x="80" y="940" font-size="18" fill="#fb923c" font-weight="600">Watch for a sudden change in log volume or verbosity on a production service</text>
  </g>
  <line x1="500" y1="978" x2="500" y2="1018" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STEP 4 — DEEP RED: collection =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1024" width="880" height="230" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1024" width="880" height="46" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="1057" width="880" height="13" fill="#7f1d1d"/>
    <text x="80" y="1055" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STEP 4</text>
    <text x="200" y="1055" font-size="23" font-weight="600" fill="#ffffff">Read the log back</text>
    <text x="80" y="1114" font-size="21" fill="#ffffff">The log file is retrieved through the same management interface</text>
    <text x="80" y="1148" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">GET /actuator/logfile</text>
    <text x="80" y="1184" font-size="18" fill="#fb923c" font-weight="600">The DETECTION is the SEQUENCE, log-level change then logfile read, within minutes</text>
    <text x="80" y="1216" font-size="18" fill="#fb923c" font-weight="600">Published as a temporal correlation rule, not as two standalone alerts</text>
  </g>

  <!-- =========== FOOTER =========== -->
  <line x1="60" y1="1300" x2="940" y2="1300" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="1334" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">Detection anchors:  Jolokia setProperty raising a logger to DEBUG or a client to FULL</text>
  <text x="500" y="1364" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">Followed within minutes by a read of /actuator/logfile from the same source</text>
  <text x="500" y="1398" text-anchor="middle" font-size="15" fill="#cccccc">Each step is individually unremarkable. Only the ordered pair is diagnostic.</text>
  <text x="500" y="1420" text-anchor="middle" font-size="15" fill="#cccccc">The technique is confirmed. Its contribution to the confirmed harvest is assessed MODERATE.</text>
  <text x="500" y="1452" text-anchor="middle" font-size="14" fill="#888888">Color legend, bands: orange initial access · red operator action · yellow data creation · deep red collection</text>
</svg>
