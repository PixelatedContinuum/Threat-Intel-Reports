<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <!--
    Layout: phase-grid (3 columns) — 8 cards, rows of 3 / 3 / 2.
    Cards 1-5 = what the single host ran (red = offensive, grey = supporting).
    Cards 6-8 = the evasion layer (yellow).
  -->
  <defs>
    <filter id="phaseShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="1500" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="1499" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="62" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">One Host, Five Roles, One Evasion Layer</text>
  <text x="500" y="106" text-anchor="middle" font-size="24" fill="#f5f5f5">The operator ran everything from one budget virtual private server</text>
  <text x="500" y="140" text-anchor="middle" font-size="17" fill="#cccccc">The three evasion elements do not connect, and do not pivot to sibling infrastructure</text>
  <line x1="60" y1="166" x2="940" y2="166" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== ROW 1 — WHAT THE HOST RAN (offensive) =========== -->

  <!-- CARD 1 (RED) -->
  <g filter="url(#phaseShadow)">
    <rect x="60" y="196" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="196" width="272" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="229" width="272" height="13" fill="#dc2626"/>
    <text x="76" y="226" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">ROLE 1</text>
    <text x="316" y="226" text-anchor="end" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">PORT 7777</text>
    <text x="76" y="278" font-size="22" font-weight="600" fill="#ffffff">Open working</text>
    <text x="76" y="304" font-size="22" font-weight="600" fill="#ffffff">directory</text>
    <text x="76" y="336" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">TCP/7777</text>
    <text x="76" y="366" font-size="20" fill="#ffffff">Static file server</text>
    <text x="76" y="394" font-size="17" fill="#e5e5e5">Publicly listable, which is</text>
    <text x="76" y="418" font-size="17" fill="#e5e5e5">why outcome artifacts sat</text>
    <text x="76" y="442" font-size="17" fill="#e5e5e5">beside the tooling</text>
    <text x="76" y="472" font-size="17" fill="#e5e5e5">Still serving as of</text>
    <text x="76" y="496" font-size="17" fill="#e5e5e5">21 July 2026</text>
  </g>

  <!-- CARD 2 (RED) -->
  <g filter="url(#phaseShadow)">
    <rect x="364" y="196" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="364" y="196" width="272" height="46" rx="8" fill="#dc2626"/>
    <rect x="364" y="229" width="272" height="13" fill="#dc2626"/>
    <text x="380" y="226" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">ROLE 2</text>
    <text x="620" y="226" text-anchor="end" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">PORT 1389</text>
    <text x="380" y="278" font-size="22" font-weight="600" fill="#ffffff">Rogue directory</text>
    <text x="380" y="304" font-size="22" font-weight="600" fill="#ffffff">server</text>
    <text x="380" y="336" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">TCP/1389 JNDI</text>
    <text x="380" y="366" font-size="20" fill="#ffffff">JNDI callback target</text>
    <text x="380" y="394" font-size="17" fill="#e5e5e5">The lookup destination</text>
    <text x="380" y="418" font-size="17" fill="#e5e5e5">referenced by the Logback</text>
    <text x="380" y="442" font-size="17" fill="#e5e5e5">payload</text>
  </g>

  <!-- CARD 3 (RED) -->
  <g filter="url(#phaseShadow)">
    <rect x="668" y="196" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="668" y="196" width="272" height="46" rx="8" fill="#dc2626"/>
    <rect x="668" y="229" width="272" height="13" fill="#dc2626"/>
    <text x="684" y="226" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">ROLE 3</text>
    <text x="924" y="226" text-anchor="end" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">PORT 9876</text>
    <text x="684" y="278" font-size="22" font-weight="600" fill="#ffffff">Shared callback</text>
    <text x="684" y="304" font-size="22" font-weight="600" fill="#ffffff">listener</text>
    <text x="684" y="336" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">TCP/9876</text>
    <text x="684" y="366" font-size="20" fill="#ffffff">One listener set</text>
    <text x="684" y="394" font-size="17" fill="#e5e5e5">Reused across otherwise</text>
    <text x="684" y="418" font-size="17" fill="#e5e5e5">unrelated exploitation</text>
    <text x="684" y="442" font-size="17" fill="#e5e5e5">classes, rather than one</text>
    <text x="684" y="466" font-size="17" fill="#e5e5e5">listener per technique</text>
  </g>

  <!-- =========== ROW 2 — SUPPORTING SERVICES + FIRST EVASION ELEMENT =========== -->

  <!-- CARD 4 (GREY) -->
  <g filter="url(#phaseShadow)">
    <rect x="60" y="570" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="570" width="272" height="46" rx="8" fill="#6b7280"/>
    <rect x="60" y="603" width="272" height="13" fill="#6b7280"/>
    <text x="76" y="600" font-size="16" font-weight="700" fill="#cccccc" letter-spacing="0.5">ROLE 4</text>
    <text x="316" y="600" text-anchor="end" font-size="16" font-weight="700" fill="#cccccc" letter-spacing="0.5">SUPPORT</text>
    <text x="76" y="652" font-size="22" font-weight="600" fill="#ffffff">Self-hosted VPN</text>
    <text x="76" y="710" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">dyn-DNS -&gt; same host</text>
    <text x="76" y="740" font-size="20" fill="#ffffff">Operator convenience</text>
    <text x="76" y="768" font-size="17" fill="#e5e5e5">A dynamic-DNS hostname</text>
    <text x="76" y="792" font-size="17" fill="#e5e5e5">resolving to the same</text>
    <text x="76" y="816" font-size="17" fill="#e5e5e5">address</text>
    <text x="76" y="846" font-size="17" fill="#e5e5e5">Not victim-facing</text>
  </g>

  <!-- CARD 5 (GREY) -->
  <g filter="url(#phaseShadow)">
    <rect x="364" y="570" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="364" y="570" width="272" height="46" rx="8" fill="#6b7280"/>
    <rect x="364" y="603" width="272" height="13" fill="#6b7280"/>
    <text x="380" y="600" font-size="16" font-weight="700" fill="#cccccc" letter-spacing="0.5">ROLE 5</text>
    <text x="620" y="600" text-anchor="end" font-size="16" font-weight="700" fill="#cccccc" letter-spacing="0.5">SUPPORT</text>
    <text x="380" y="652" font-size="22" font-weight="600" fill="#ffffff">Agent framework,</text>
    <text x="380" y="678" font-size="22" font-weight="600" fill="#ffffff">running as root</text>
    <text x="380" y="710" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">runs as root</text>
    <text x="380" y="740" font-size="20" fill="#ffffff">Off-the-shelf tooling</text>
    <text x="380" y="768" font-size="17" fill="#e5e5e5">Open-source software</text>
    <text x="380" y="792" font-size="17" fill="#e5e5e5">cloned from public repos,</text>
    <text x="380" y="816" font-size="17" fill="#e5e5e5">driven from a consumer</text>
    <text x="380" y="840" font-size="17" fill="#e5e5e5">messaging platform</text>
    <text x="380" y="874" font-size="17" font-weight="700" fill="#ffffff">Execution UNCONFIRMED</text>
  </g>

  <!-- CARD 6 (YELLOW) -->
  <g filter="url(#phaseShadow)">
    <rect x="668" y="570" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="668" y="570" width="272" height="46" rx="8" fill="#eab308"/>
    <rect x="668" y="603" width="272" height="13" fill="#eab308"/>
    <text x="684" y="600" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">EVASION 1</text>
    <text x="924" y="600" text-anchor="end" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">SOURCE</text>
    <text x="684" y="652" font-size="22" font-weight="600" fill="#ffffff">Proxied control</text>
    <text x="684" y="678" font-size="22" font-weight="600" fill="#ffffff">source</text>
    <text x="684" y="710" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">proxy egress</text>
    <text x="684" y="740" font-size="20" fill="#ffffff">Not an identity anchor</text>
    <text x="684" y="768" font-size="17" fill="#e5e5e5">The address the operator</text>
    <text x="684" y="792" font-size="17" fill="#e5e5e5">connects from. Most likely</text>
    <text x="684" y="816" font-size="17" fill="#e5e5e5">shared rented proxy egress</text>
    <text x="684" y="846" font-size="17" fill="#e5e5e5">Do not use it to cluster</text>
    <text x="684" y="870" font-size="17" fill="#e5e5e5">future activity</text>
  </g>

  <!-- =========== ROW 3 — REMAINING EVASION LAYER =========== -->

  <!-- CARD 7 (YELLOW) -->
  <g filter="url(#phaseShadow)">
    <rect x="212" y="944" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="212" y="944" width="272" height="46" rx="8" fill="#eab308"/>
    <rect x="212" y="977" width="272" height="13" fill="#eab308"/>
    <text x="228" y="974" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">EVASION 2</text>
    <text x="468" y="974" text-anchor="end" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">RELAY</text>
    <text x="228" y="1026" font-size="22" font-weight="600" fill="#ffffff">Serverless attack</text>
    <text x="228" y="1052" font-size="22" font-weight="600" fill="#ffffff">relay</text>
    <text x="228" y="1084" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">cloud function relay</text>
    <text x="228" y="1114" font-size="20" fill="#ffffff">Defeats rate limiting</text>
    <text x="228" y="1142" font-size="17" fill="#e5e5e5">A legitimate cloud function</text>
    <text x="228" y="1166" font-size="17" fill="#e5e5e5">reused to relay attack</text>
    <text x="228" y="1190" font-size="17" fill="#e5e5e5">traffic, seen across two</text>
    <text x="228" y="1214" font-size="17" fill="#e5e5e5">independent attack types</text>
    <text x="228" y="1244" font-size="17" fill="#e5e5e5">Address-based blocking</text>
    <text x="228" y="1268" font-size="17" fill="#e5e5e5">does not hold</text>
  </g>

  <!-- CARD 8 (YELLOW) -->
  <g filter="url(#phaseShadow)">
    <rect x="516" y="944" width="272" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="516" y="944" width="272" height="46" rx="8" fill="#eab308"/>
    <rect x="516" y="977" width="272" height="13" fill="#eab308"/>
    <text x="532" y="974" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">EVASION 3</text>
    <text x="772" y="974" text-anchor="end" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">POSTURE</text>
    <text x="532" y="1026" font-size="22" font-weight="600" fill="#ffffff">Budget hosting</text>
    <text x="532" y="1052" font-size="22" font-weight="600" fill="#ffffff">posture</text>
    <text x="532" y="1084" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">one host, no rotation</text>
    <text x="532" y="1114" font-size="20" fill="#ffffff">Not bulletproof hosting</text>
    <text x="532" y="1142" font-size="17" fill="#e5e5e5">A mainstream low-cost</text>
    <text x="532" y="1166" font-size="17" fill="#e5e5e5">provider. One host, run</text>
    <text x="532" y="1190" font-size="17" fill="#e5e5e5">continuously, with no</text>
    <text x="532" y="1214" font-size="17" fill="#e5e5e5">observed address rotation</text>
  </g>

  <!-- =========== FOOTER =========== -->
  <line x1="60" y1="1322" x2="940" y2="1322" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="1358" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">Strongest clustering artifact: one default key comment across three key pairs</text>
  <text x="500" y="1388" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">The proxied control source is explicitly EXCLUDED as a clustering discriminator</text>
  <text x="500" y="1420" text-anchor="middle" font-size="15" fill="#cccccc">Three obfuscation choices that do not cluster.</text>
  <text x="500" y="1442" text-anchor="middle" font-size="15" fill="#cccccc">They read as independent single-use decisions, not a designed architecture.</text>
  <text x="500" y="1474" text-anchor="middle" font-size="14" fill="#888888">Color legend, bands: red offensive service · grey supporting service · yellow evasion layer</text>
</svg>
