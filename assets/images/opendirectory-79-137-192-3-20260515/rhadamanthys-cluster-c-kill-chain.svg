<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="2900" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="2899" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="58" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">Cluster C — Rhadamanthys Kill Chain</text>
  <text x="500" y="98" text-anchor="middle" font-size="24" fill="#f5f5f5">staticlittlesource.exe  →  InstallUtil.exe hollow  →  C2 79.133.180.168:3394</text>
  <text x="500" y="132" text-anchor="middle" font-size="17" fill="#cccccc">Loader (VS2019, customer-built) hollows a signed Microsoft .NET LOLBin and hands off to canonical Rhadamanthys Stage-2</text>
  <text x="500" y="156" text-anchor="middle" font-size="17" fill="#cccccc">First 17 seconds of execution are the highest-value detection window  ·  ~14s sleep + ~3s setup before first C2 beacon</text>
  <line x1="60" y1="180" x2="940" y2="180" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== STAGE 1 (orange — initial execution) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="210" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="210" width="880" height="42" rx="8" fill="#f97316"/>
    <rect x="60" y="240" width="880" height="12" fill="#f97316"/>
    <text x="80" y="240" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 1  ·  T+0</text>
    <text x="280" y="240" font-size="21" font-weight="600" fill="#111111">Initial execution</text>
    <text x="80" y="290" font-size="20" fill="#ffffff">User executes <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">staticlittlesource.exe</tspan></text>
    <text x="80" y="324" font-size="17" fill="#e5e5e5">1.39 MB MSVC C++ binary, VS2019 / MSVC 19.34, LTCG/C++.</text>
    <text x="80" y="356" font-size="17" fill="#e5e5e5">Delivery vector unconfirmed — file naming pattern is consistent</text>
    <text x="80" y="382" font-size="17" fill="#e5e5e5">with a cracked-software / game-cheat lure dropped by an SEO or warez channel.</text>
  </g>
  <line x1="500" y1="410" x2="500" y2="450" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 2 (orange — anti-analysis sleep) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="456" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="456" width="880" height="42" rx="8" fill="#f97316"/>
    <rect x="60" y="486" width="880" height="12" fill="#f97316"/>
    <text x="80" y="486" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 2  ·  T+0 → T+14s</text>
    <text x="320" y="486" font-size="21" font-weight="600" fill="#111111">14-second anti-analysis gauntlet</text>
    <text x="80" y="536" font-size="20" fill="#ffffff">Cumulative <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Sleep</tspan> calls totaling ~14 seconds.</text>
    <text x="80" y="570" font-size="17" fill="#e5e5e5">Interleaved with floating-point computations producing denormal-sentinel values.</text>
    <text x="80" y="600" font-size="17" fill="#e5e5e5">Mismatch against hardcoded reference indicates emulated FPU — exits silently.</text>
    <text x="80" y="630" font-size="17" fill="#fb923c" font-weight="600">Sleep-skipping fails because skipped sleeps don't accumulate FPU state correctly.</text>
  </g>
  <line x1="500" y1="656" x2="500" y2="696" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 3 (red — RC4 decrypt) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="702" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="702" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="732" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="732" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 3  ·  T+14s</text>
    <text x="280" y="732" font-size="21" font-weight="600" fill="#ffffff">RC4 decrypt embedded Stage-2 PE</text>
    <text x="80" y="782" font-size="20" fill="#ffffff">Loader extracts the encrypted Stage-2 from <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.data</tspan> and</text>
    <text x="80" y="812" font-size="20" fill="#ffffff">RC4-decrypts using the 31-byte key:</text>
    <text x="80" y="846" font-size="14" fill="#fb923c" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">e0802540d02d0feaeb277dc720e390b06dfd64d8f8104d9581e788e512715b</text>
    <text x="80" y="876" font-size="17" fill="#e5e5e5">Result: a fully-formed PE with valid <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">MZ</tspan>/<tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">PE</tspan> headers and the canonical <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.frontb</tspan> section.</text>
  </g>
  <line x1="500" y1="902" x2="500" y2="942" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 4 (red — spawn InstallUtil) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="948" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="948" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="978" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="978" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 4  ·  T+14s</text>
    <text x="280" y="978" font-size="21" font-weight="600" fill="#ffffff">Spawn InstallUtil.exe SUSPENDED</text>
    <text x="80" y="1028" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">CreateProcessA(</text>
    <text x="80" y="1054" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">  "C:\Windows\Microsoft.NET\Framework\v4.0.30319\InstallUtil.exe",</text>
    <text x="80" y="1080" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">  CREATE_SUSPENDED, ...)</text>
    <text x="80" y="1112" font-size="17" fill="#fb923c" font-weight="600">InstallUtil.exe is a signed Microsoft .NET LOLBin — undocumented in</text>
    <text x="80" y="1136" font-size="17" fill="#fb923c" font-weight="600">any Rhadamanthys public reporting (per-customer hollowing target choice).</text>
  </g>
  <line x1="500" y1="1148" x2="500" y2="1188" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 5 (red — NtUnmap + W^X write) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1194" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1194" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="1224" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="1224" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 5  ·  T+14s</text>
    <text x="280" y="1224" font-size="21" font-weight="600" fill="#ffffff">Unmap + W^X write Stage-2 PE</text>
    <text x="80" y="1274" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">NtUnmapViewOfSection</text><text x="320" y="1274" font-size="17" fill="#e5e5e5">  unmaps the original InstallUtil image.</text>
    <text x="80" y="1304" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">VirtualAllocEx(PAGE_READWRITE)</text><text x="430" y="1304" font-size="17" fill="#e5e5e5">  + <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">WriteProcessMemory</tspan>  writes Stage-2.</text>
    <text x="80" y="1334" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">VirtualProtectEx(PAGE_EXECUTE_READ)</text><text x="500" y="1334" font-size="17" fill="#e5e5e5">  flips memory to RX (W^X transition).</text>
    <text x="80" y="1366" font-size="17" fill="#fb923c" font-weight="600">No RWX page is ever allocated — defeats RWX-allocation EDR detection.</text>
  </g>
  <line x1="500" y1="1394" x2="500" y2="1434" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 6 (red — EAX-redirect + Resume) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1440" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1440" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="1470" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="1470" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 6  ·  T+14s</text>
    <text x="280" y="1470" font-size="21" font-weight="600" fill="#ffffff">EAX-redirect entry-point hijack + ResumeThread</text>
    <text x="80" y="1520" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">GetThreadContext  →  modify ctx.Eax = stage2_entry  →  SetThreadContext  →  ResumeThread</text>
    <text x="80" y="1556" font-size="17" fill="#e5e5e5">Only the <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Eax</tspan> field is patched — never <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Eip</tspan>/<tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Rip</tspan>. <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">BaseThreadInitThunk</tspan> jumps to <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">EAX</tspan>.</text>
    <text x="80" y="1588" font-size="17" fill="#fb923c" font-weight="600">Defeats EDR rules keying on SetThreadContext-with-modified-Eip — the variant</text>
    <text x="80" y="1612" font-size="17" fill="#fb923c" font-weight="600">touches Eax instead. Loader exits cleanly after Resume.</text>
  </g>
  <line x1="500" y1="1640" x2="500" y2="1680" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 7 (red — Stage-2 setup inside InstallUtil) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1686" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1686" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="1716" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="1716" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 7  ·  T+14s+</text>
    <text x="320" y="1716" font-size="21" font-weight="600" fill="#ffffff">Stage-2 setup inside InstallUtil.exe</text>
    <text x="80" y="1766" font-size="17" fill="#e5e5e5">PEB walk to resolve Windows APIs by hash (registry, crypto, network).</text>
    <text x="80" y="1796" font-size="17" fill="#e5e5e5">Run 8,800+ byte-emitter functions, hex-decode 7,979 fake-GUID strings,</text>
    <text x="80" y="1822" font-size="17" fill="#e5e5e5">unpack 14-bit packed stream  →  synthesize encrypted FS container in heap.</text>
    <text x="80" y="1852" font-size="17" fill="#fb923c" font-weight="600">CBC-XOR decrypt with per-customer IV  →  parse 5-entry FS container.</text>
  </g>
  <line x1="500" y1="1886" x2="500" y2="1926" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 8 (yellow — analyzer-process check + SibCode persistence) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1932" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1932" width="880" height="42" rx="8" fill="#eab308"/>
    <rect x="60" y="1962" width="880" height="12" fill="#eab308"/>
    <text x="80" y="1962" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 8  ·  T+14s+</text>
    <text x="320" y="1962" font-size="21" font-weight="600" fill="#111111">Analyzer-process check + SibCode persistence marker</text>
    <text x="80" y="2012" font-size="17" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">NtQuerySystemInformation</tspan>  enumerates running processes.</text>
    <text x="80" y="2040" font-size="17" fill="#e5e5e5">FS entry-3 blocklist (Procmon, x64dbg, IDA, Ghidra, ProcessHacker, sandbox names) — exit if hit.</text>
    <text x="80" y="2070" font-size="17" fill="#e5e5e5">Write Unix timestamp to <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">HKU\&lt;SID&gt;\Software\SibCode\sn</tspan>.</text>
    <text x="80" y="2102" font-size="17" fill="#fb923c" font-weight="600">SibCode\sn is a vendor pre-v0.9.1 family marker — high-fidelity defender hunt anchor.</text>
  </g>
  <line x1="500" y1="2132" x2="500" y2="2172" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 9 (deep red — first C2 beacon) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2178" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2178" width="880" height="42" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2208" width="880" height="12" fill="#7f1d1d"/>
    <text x="80" y="2208" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 9  ·  T+14s+</text>
    <text x="280" y="2208" font-size="21" font-weight="600" fill="#ffffff">First C2 beacon  +  receive plugin modules</text>
    <text x="80" y="2258" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">https://79.133.180.168:3394/e6d92c6b5b2a03bee7fbab40/&lt;random&gt;.&lt;ext&gt;</text>
    <text x="80" y="2290" font-size="17" fill="#e5e5e5">TLS pins to operator's Samsung-impersonation server cert (51-SAN DigiCert).</text>
    <text x="80" y="2320" font-size="17" fill="#e5e5e5">C2 responds with XS1/XS2 plugin modules — loaded in-memory inside <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">InstallUtil.exe</tspan>.</text>
    <text x="80" y="2352" font-size="17" fill="#fb923c" font-weight="600">First beacon ~17s after sample launch — peak detection-window deadline.</text>
  </g>
  <line x1="500" y1="2378" x2="500" y2="2418" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 10 (deep red — credential theft endgame) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2424" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2424" width="880" height="42" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2454" width="880" height="12" fill="#7f1d1d"/>
    <text x="80" y="2454" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 10  ·  ongoing</text>
    <text x="320" y="2454" font-size="21" font-weight="600" fill="#ffffff">Credential / wallet / MFA theft  +  encrypted exfil</text>
    <text x="80" y="2504" font-size="17" fill="#e5e5e5">Plugin modules enumerate browser stores, crypto wallet directories, password</text>
    <text x="80" y="2532" font-size="17" fill="#e5e5e5">manager files, MFA tokens, VPN client configs, email client credentials.</text>
    <text x="80" y="2562" font-size="17" fill="#e5e5e5">Encrypted exfil over the established C2 channel — same JARM, same TLS pin.</text>
    <text x="80" y="2596" font-size="17" fill="#fb923c" font-weight="600">By this point malware is established and detection options narrow to network-side.</text>
  </g>

  <!-- =========== FOOTER =========== -->
  <line x1="60" y1="2710" x2="940" y2="2710" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="2740" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">Detection anchors:  parent-child staticlittlesource → InstallUtil.exe  ·  InstallUtil.exe with no /u flag  ·  HKU\...\SibCode\sn  ·  79.133.180.168:3394 outbound</text>
  <text x="500" y="2770" text-anchor="middle" font-size="14" fill="#cccccc">Highest-value detection window: T+14s through T+17s (just before first C2 beacon). After Stage 9, defenders are reacting rather than preventing.</text>
  <text x="500" y="2800" text-anchor="middle" font-size="13" fill="#888888">Color legend  —  orange: launch + sandbox evasion  ·  red: operator code (decrypt + hollowing + Stage-2 setup)  ·  yellow: Stage-2 staging  ·  deep red: endgame (C2 + theft)</text>
</svg>
