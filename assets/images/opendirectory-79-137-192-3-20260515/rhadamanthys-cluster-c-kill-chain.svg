<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 3100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="3100" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="3099" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="62" text-anchor="middle" font-size="42" font-weight="700" fill="#ffffff">Cluster C — Rhadamanthys Kill Chain</text>
  <text x="500" y="106" text-anchor="middle" font-size="26" fill="#f5f5f5">staticlittlesource.exe → InstallUtil.exe hollow → C2 79.133.180.168:3394</text>
  <text x="500" y="144" text-anchor="middle" font-size="18" fill="#cccccc">Loader (VS2019, customer-built) hollows a signed Microsoft .NET LOLBin and hands off to canonical Rhadamanthys Stage-2</text>
  <text x="500" y="170" text-anchor="middle" font-size="18" fill="#cccccc">First 17 seconds of execution are the highest-value detection window  ·  ~14s sleep + ~3s setup before first C2 beacon</text>
  <line x1="60" y1="196" x2="940" y2="196" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== STAGE 1 (orange — initial execution) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="226" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="226" width="880" height="46" rx="8" fill="#f97316"/>
    <rect x="60" y="259" width="880" height="13" fill="#f97316"/>
    <text x="80" y="257" font-size="17" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 1  ·  T+0</text>
    <text x="290" y="257" font-size="22" font-weight="600" fill="#111111">Initial execution</text>
    <text x="80" y="310" font-size="22" fill="#ffffff">User executes <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">staticlittlesource.exe</tspan></text>
    <text x="80" y="346" font-size="18" fill="#e5e5e5">1.39 MB MSVC C++ binary, Visual Studio 2019 / MSVC 19.34, LTCG/C++.</text>
    <text x="80" y="378" font-size="18" fill="#e5e5e5">Delivery vector unconfirmed — file naming pattern is consistent with</text>
    <text x="80" y="406" font-size="18" fill="#e5e5e5">a cracked-software / game-cheat lure dropped via SEO or warez channel.</text>
  </g>
  <line x1="500" y1="436" x2="500" y2="476" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 2 (orange — anti-analysis sleep) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="482" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="482" width="880" height="46" rx="8" fill="#f97316"/>
    <rect x="60" y="515" width="880" height="13" fill="#f97316"/>
    <text x="80" y="513" font-size="17" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 2  ·  T+0 → T+14s</text>
    <text x="350" y="513" font-size="22" font-weight="600" fill="#111111">14-second anti-analysis gauntlet</text>
    <text x="80" y="566" font-size="22" fill="#ffffff">Cumulative <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Sleep</tspan> calls totaling ~14 seconds.</text>
    <text x="80" y="602" font-size="18" fill="#e5e5e5">Interleaved with floating-point computations producing denormal-sentinel values.</text>
    <text x="80" y="632" font-size="18" fill="#e5e5e5">Mismatch against hardcoded reference indicates emulated FPU — exits silently.</text>
    <text x="80" y="666" font-size="18" fill="#fb923c" font-weight="600">Sleep-skipping fails: skipped sleeps don't accumulate FPU state correctly.</text>
  </g>
  <line x1="500" y1="692" x2="500" y2="732" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 3 (red — RC4 decrypt) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="738" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="738" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="771" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="769" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 3  ·  T+14s</text>
    <text x="290" y="769" font-size="22" font-weight="600" fill="#ffffff">RC4 decrypt embedded Stage-2 PE</text>
    <text x="80" y="822" font-size="22" fill="#ffffff">Loader extracts the encrypted Stage-2 from <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.data</tspan></text>
    <text x="80" y="852" font-size="22" fill="#ffffff">and RC4-decrypts using a 31-byte key:</text>
    <text x="80" y="886" font-size="15" fill="#fb923c" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">e0802540d02d0feaeb277dc720e390b06dfd64d8f8104d9581e788e512715b</text>
    <text x="80" y="918" font-size="18" fill="#e5e5e5">Result: fully-formed PE with valid <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">MZ</tspan>/<tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">PE</tspan> headers + Rhadamanthys <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.frontb</tspan> section.</text>
  </g>
  <line x1="500" y1="948" x2="500" y2="988" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 4 (red — spawn InstallUtil) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="994" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="994" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="1027" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="1025" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 4  ·  T+14s</text>
    <text x="290" y="1025" font-size="22" font-weight="600" fill="#ffffff">Spawn InstallUtil.exe SUSPENDED</text>
    <text x="80" y="1078" font-size="18" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">CreateProcessA(</text>
    <text x="80" y="1106" font-size="18" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">  "C:\Windows\Microsoft.NET\Framework\v4.0.30319\InstallUtil.exe",</text>
    <text x="80" y="1134" font-size="18" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">  CREATE_SUSPENDED, ...)</text>
    <text x="80" y="1168" font-size="18" fill="#fb923c" font-weight="600">InstallUtil.exe is a signed Microsoft .NET LOLBin — undocumented in any</text>
    <text x="80" y="1196" font-size="18" fill="#fb923c" font-weight="600">Rhadamanthys public reporting (per-customer hollowing target choice).</text>
  </g>
  <line x1="500" y1="1204" x2="500" y2="1244" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 5 (red — NtUnmap + W^X write) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1250" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1250" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="1283" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="1281" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 5  ·  T+14s</text>
    <text x="290" y="1281" font-size="22" font-weight="600" fill="#ffffff">Unmap + W^X write Stage-2 PE</text>
    <text x="80" y="1334" font-size="18" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">NtUnmapViewOfSection</tspan> unmaps the original InstallUtil image.</text>
    <text x="80" y="1366" font-size="18" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">VirtualAllocEx(PAGE_READWRITE)</tspan> + <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">WriteProcessMemory</tspan> writes Stage-2.</text>
    <text x="80" y="1398" font-size="18" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">VirtualProtectEx(PAGE_EXECUTE_READ)</tspan> flips memory to RX (W^X transition).</text>
    <text x="80" y="1432" font-size="18" fill="#fb923c" font-weight="600">No RWX page is ever allocated — defeats RWX-allocation EDR detection.</text>
  </g>
  <line x1="500" y1="1460" x2="500" y2="1500" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 6 (red — EAX-redirect + Resume) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1506" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1506" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="1539" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="1537" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 6  ·  T+14s</text>
    <text x="290" y="1537" font-size="22" font-weight="600" fill="#ffffff">EAX-redirect entry-point hijack</text>
    <text x="80" y="1590" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">GetThreadContext → modify ctx.Eax = stage2_entry → SetThreadContext → ResumeThread</text>
    <text x="80" y="1624" font-size="18" fill="#e5e5e5">Only the <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Eax</tspan> field is patched — never <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Eip</tspan>/<tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Rip</tspan>.</text>
    <text x="80" y="1654" font-size="18" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">BaseThreadInitThunk</tspan> jumps to the address in <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">EAX</tspan>; loader exits cleanly.</text>
    <text x="80" y="1690" font-size="18" fill="#fb923c" font-weight="600">Defeats EDR rules keying on SetThreadContext-with-modified-Eip.</text>
  </g>
  <line x1="500" y1="1716" x2="500" y2="1756" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 7 (red — Stage-2 setup) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1762" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1762" width="880" height="46" rx="8" fill="#dc2626"/>
    <rect x="60" y="1795" width="880" height="13" fill="#dc2626"/>
    <text x="80" y="1793" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 7  ·  T+14s+</text>
    <text x="330" y="1793" font-size="22" font-weight="600" fill="#ffffff">Stage-2 setup inside InstallUtil</text>
    <text x="80" y="1846" font-size="20" fill="#ffffff">PEB walk to resolve Windows APIs by hash (registry, crypto, network).</text>
    <text x="80" y="1880" font-size="18" fill="#e5e5e5">Run 8,800+ byte-emitter functions, hex-decode 7,979 fake-GUIDs,</text>
    <text x="80" y="1910" font-size="18" fill="#e5e5e5">unpack 14-bit packed stream → synthesize encrypted FS container in heap.</text>
    <text x="80" y="1944" font-size="18" fill="#fb923c" font-weight="600">CBC-XOR decrypt with per-customer IV → parse 5-entry FS container.</text>
  </g>
  <line x1="500" y1="1972" x2="500" y2="2012" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 8 (yellow — analyzer-process check + SibCode persistence) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2018" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2018" width="880" height="46" rx="8" fill="#eab308"/>
    <rect x="60" y="2051" width="880" height="13" fill="#eab308"/>
    <text x="80" y="2049" font-size="17" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 8  ·  T+14s+</text>
    <text x="330" y="2049" font-size="22" font-weight="600" fill="#111111">Anti-analysis check + SibCode persistence</text>
    <text x="80" y="2102" font-size="18" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">NtQuerySystemInformation</tspan> enumerates running processes.</text>
    <text x="80" y="2132" font-size="18" fill="#e5e5e5">FS entry-3 blocklist (Procmon, x64dbg, IDA, Ghidra, sandbox names) — exit if hit.</text>
    <text x="80" y="2164" font-size="18" fill="#e5e5e5">Write Unix timestamp to <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">HKU\&lt;SID&gt;\Software\SibCode\sn</tspan>.</text>
    <text x="80" y="2200" font-size="18" fill="#fb923c" font-weight="600">SibCode\sn is a pre-v0.9.1 family marker — high-fidelity hunt anchor.</text>
  </g>
  <line x1="500" y1="2228" x2="500" y2="2268" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 9 (deep red — first C2 beacon) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2274" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2274" width="880" height="46" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2307" width="880" height="13" fill="#7f1d1d"/>
    <text x="80" y="2305" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 9  ·  T+14s+</text>
    <text x="290" y="2305" font-size="22" font-weight="600" fill="#ffffff">First C2 beacon + receive plugins</text>
    <text x="80" y="2358" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">https://79.133.180.168:3394/e6d92c6b5b2a03bee7fbab40/&lt;random&gt;.&lt;ext&gt;</text>
    <text x="80" y="2392" font-size="18" fill="#e5e5e5">TLS pins to operator's Samsung-impersonation server cert (51-SAN DigiCert).</text>
    <text x="80" y="2424" font-size="18" fill="#e5e5e5">C2 responds with XS1/XS2 plugin modules — loaded in-memory inside InstallUtil.</text>
    <text x="80" y="2458" font-size="18" fill="#fb923c" font-weight="600">First beacon ~17s after sample launch — peak detection-window deadline.</text>
  </g>
  <line x1="500" y1="2484" x2="500" y2="2524" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 10 (deep red — credential theft endgame) =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2530" width="880" height="210" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2530" width="880" height="46" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2563" width="880" height="13" fill="#7f1d1d"/>
    <text x="80" y="2561" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 10  ·  ongoing</text>
    <text x="330" y="2561" font-size="22" font-weight="600" fill="#ffffff">Credential / wallet / MFA theft + exfil</text>
    <text x="80" y="2614" font-size="18" fill="#e5e5e5">Plugin modules enumerate browser stores, crypto wallet directories, password</text>
    <text x="80" y="2644" font-size="18" fill="#e5e5e5">manager files, MFA tokens, VPN client configs, email client credentials.</text>
    <text x="80" y="2676" font-size="18" fill="#e5e5e5">Encrypted exfil over the established C2 channel — same JARM, same TLS pin.</text>
    <text x="80" y="2710" font-size="18" fill="#fb923c" font-weight="600">By this point detection options narrow to network-side blocking.</text>
  </g>

  <!-- =========== FOOTER (detection anchors wrapped across 2 lines) =========== -->
  <line x1="60" y1="2820" x2="940" y2="2820" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="2854" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">Detection anchors:  parent-child staticlittlesource → InstallUtil.exe</text>
  <text x="500" y="2884" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">InstallUtil.exe with no /u flag  ·  HKU\...\SibCode\sn registry write  ·  79.133.180.168:3394 outbound</text>
  <text x="500" y="2924" text-anchor="middle" font-size="15" fill="#cccccc">Highest-value detection window: T+14s through T+17s (just before first C2 beacon).</text>
  <text x="500" y="2952" text-anchor="middle" font-size="15" fill="#cccccc">After Stage 9, defenders are reacting rather than preventing.</text>
  <text x="500" y="2988" text-anchor="middle" font-size="14" fill="#888888">Color legend  —  orange: launch + sandbox evasion  ·  red: operator code (decrypt, hollow, Stage-2 setup)  ·  yellow: staging  ·  deep red: endgame</text>
</svg>
