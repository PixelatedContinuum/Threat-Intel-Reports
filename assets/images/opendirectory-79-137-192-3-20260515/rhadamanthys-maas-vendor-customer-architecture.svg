<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="treeShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="1080" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="1079" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="60" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">Rhadamanthys MaaS — Vendor/Customer Architecture</text>
  <text x="500" y="104" text-anchor="middle" font-size="24" fill="#f5f5f5">One vendor, many customers — each brings their own loader and operates their own C2</text>
  <text x="500" y="138" text-anchor="middle" font-size="18" fill="#cccccc">UTA-2026-010 tracks the customer-side operator only  ·  the Rhadamanthys MaaS vendor is a separate threat-intel target</text>
  <line x1="60" y1="166" x2="940" y2="166" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== VENDOR (red side-rail, centered) =========== -->
  <g filter="url(#treeShadow)">
    <rect x="200" y="196" width="600" height="140" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="200" y="196" width="6" height="140" rx="3" fill="#dc2626"/>
    <text x="220" y="232" font-size="24" font-weight="700" fill="#ffffff">Rhadamanthys MaaS Vendor</text>
    <text x="220" y="266" font-size="18" fill="#e5e5e5">Develops + sells canonical Stage-2 to multiple customers</text>
    <text x="220" y="294" font-size="16" fill="#cccccc">VS2003 toolchain  ·  Q3VM-derivative VM magic <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">0x14744214</tspan></text>
    <text x="220" y="318" font-size="16" fill="#cccccc">3-layer encrypted-blob synthesis  ·  SEPARATE threat-intel target (Check Point, Outpost24)</text>
  </g>

  <!-- =========== Vendor → 3-way fanout =========== -->
  <line x1="500" y1="336" x2="500" y2="380" stroke="#666666" stroke-width="2"/>
  <line x1="170" y1="380" x2="830" y2="380" stroke="#666666" stroke-width="2"/>
  <line x1="170" y1="380" x2="170" y2="420" stroke="#666666" stroke-width="2"/>
  <line x1="500" y1="380" x2="500" y2="420" stroke="#666666" stroke-width="2"/>
  <line x1="830" y1="380" x2="830" y2="420" stroke="#666666" stroke-width="2"/>

  <!-- =========== LEFT CUSTOMER A (red side-rail) =========== -->
  <g filter="url(#treeShadow)">
    <rect x="30" y="420" width="280" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="30" y="420" width="6" height="340" rx="3" fill="#dc2626"/>
    <text x="50" y="455" font-size="20" font-weight="700" fill="#ffffff">Customer A</text>
    <text x="50" y="482" font-size="15" fill="#cccccc">(sibling Stage-2)</text>
    <text x="50" y="522" font-size="17" fill="#e5e5e5">Loader (different build)</text>
    <text x="50" y="548" font-size="15" fill="#cccccc" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">bc9fe5e9...</text>
    <text x="50" y="580" font-size="16" fill="#cccccc">Different operator strings</text>
    <text x="50" y="606" font-size="16" fill="#cccccc">Different RC4 key</text>
    <text x="50" y="632" font-size="16" fill="#cccccc">Different LOLBin choice</text>
    <line x1="50" y1="650" x2="290" y2="650" stroke="#2a2a2a" stroke-width="1"/>
    <text x="50" y="682" font-size="17" fill="#fb923c" font-weight="600">→ different C2 endpoint</text>
    <text x="50" y="710" font-size="16" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">45.81.39.169</text>
    <text x="50" y="736" font-size="15" fill="#cccccc">OCULUS US AS</text>
  </g>

  <!-- =========== MIDDLE CUSTOMER — THIS CAMPAIGN (deep-red border + side-rail) =========== -->
  <g filter="url(#treeShadow)">
    <rect x="360" y="420" width="280" height="340" rx="8" fill="#1a1a1a" stroke="#7f1d1d" stroke-width="3"/>
    <rect x="360" y="420" width="6" height="340" rx="3" fill="#7f1d1d"/>
    <text x="380" y="455" font-size="20" font-weight="700" fill="#ffffff">★ UTA-2026-010</text>
    <text x="380" y="482" font-size="15" fill="#fb923c" font-weight="700">THIS REPORT — Cluster C</text>
    <text x="380" y="520" font-size="17" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">staticlittlesource.exe</tspan></text>
    <text x="380" y="544" font-size="14" fill="#cccccc" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">5c38a5dd... (1.39 MB)</text>
    <text x="380" y="578" font-size="16" fill="#cccccc">Op strings: BombAUb23456,</text>
    <text x="380" y="600" font-size="16" fill="#cccccc">DubzAias932, Ahuh783bh...</text>
    <text x="380" y="626" font-size="16" fill="#cccccc">LOLBin: <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">InstallUtil.exe</tspan></text>
    <line x1="380" y1="646" x2="620" y2="646" stroke="#2a2a2a" stroke-width="1"/>
    <text x="380" y="678" font-size="17" fill="#fb923c" font-weight="700">→ this customer's C2</text>
    <text x="380" y="706" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">79.133.180.168:3394</text>
    <text x="380" y="732" font-size="15" fill="#cccccc">Hostkey NL AS57043</text>
  </g>

  <!-- =========== RIGHT CUSTOMER B (red side-rail) =========== -->
  <g filter="url(#treeShadow)">
    <rect x="690" y="420" width="280" height="340" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="690" y="420" width="6" height="340" rx="3" fill="#dc2626"/>
    <text x="710" y="455" font-size="20" font-weight="700" fill="#ffffff">Customer B</text>
    <text x="710" y="482" font-size="15" fill="#cccccc">(sibling Stage-2)</text>
    <text x="710" y="522" font-size="17" fill="#e5e5e5">Loader (different build)</text>
    <text x="710" y="548" font-size="14" fill="#cccccc" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">e827d13c... / 457aecd8...</text>
    <text x="710" y="580" font-size="16" fill="#cccccc">Different operator strings</text>
    <text x="710" y="606" font-size="16" fill="#cccccc">Different RC4 key</text>
    <text x="710" y="632" font-size="16" fill="#cccccc">Different LOLBin choice</text>
    <line x1="710" y1="650" x2="950" y2="650" stroke="#2a2a2a" stroke-width="1"/>
    <text x="710" y="682" font-size="17" fill="#fb923c" font-weight="600">→ different C2 endpoint</text>
    <text x="710" y="710" font-size="15" fill="#e5e5e5">(per-customer C2 not extracted</text>
    <text x="710" y="732" font-size="15" fill="#cccccc">— sandbox emulation fails)</text>
  </g>

  <!-- =========== Common-element band (grey side-rail) =========== -->
  <g filter="url(#treeShadow)">
    <rect x="60" y="790" width="880" height="110" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="790" width="6" height="110" rx="3" fill="#6b7280"/>
    <text x="80" y="822" font-size="18" font-weight="700" fill="#ffffff">All customers receive the same vendor-side Stage-2 product:</text>
    <text x="80" y="852" font-size="16" fill="#e5e5e5"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.frontb</tspan> section  ·  Q3VM VM magic <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">0x14744214</tspan>  ·  3-layer synthesis  ·  CBC-XOR cipher  ·  FS container  ·  XS1/XS2 plugins</text>
    <text x="80" y="880" font-size="15" fill="#cccccc">Family signatures (vendor-side, cross-customer). Customer-specific fingerprints differ per customer.</text>
  </g>

  <!-- =========== FOOTER =========== -->
  <line x1="60" y1="932" x2="940" y2="932" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="962" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">This report's customer-side fingerprints (RC4 key, IV, operator strings, Hostkey C2) catch THIS operator only</text>
  <text x="500" y="990" text-anchor="middle" font-size="15" fill="#cccccc">Vendor-side fingerprints (Q3VM magic, .frontb, SibCode\sn pre-v0.9.1 marker) catch the entire Rhadamanthys customer population</text>
  <text x="500" y="1024" text-anchor="middle" font-size="14" fill="#888888">Color legend  —  red: code (vendor + customer loaders)  ·  deep red: this customer's endgame  ·  grey: shared/common element</text>
</svg>
