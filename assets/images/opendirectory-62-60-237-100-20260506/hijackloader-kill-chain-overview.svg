<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="2900" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="2899" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="58" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">Kill Chain Overview</text>
  <text x="500" y="98" text-anchor="middle" font-size="24" fill="#f5f5f5">HijackLoader / Penguish / Rugmi  →  AsyncRAT-class .NET RAT</text>
  <text x="500" y="132" text-anchor="middle" font-size="17" fill="#cccccc">Primary sample: Carriers.exe  ·  Staging 62.60.237[.]100 (AS210644 AEZA, OFAC SDN)</text>
  <text x="500" y="156" text-anchor="middle" font-size="17" fill="#cccccc">C2 185.241.208[.]129:56167 (AS210558 1337 Services, Spamhaus DROP)</text>
  <line x1="60" y1="180" x2="940" y2="180" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== STAGE 0 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="210" width="880" height="180" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="210" width="880" height="42" rx="8" fill="#f97316"/>
    <rect x="60" y="240" width="880" height="12" fill="#f97316"/>
    <text x="80" y="240" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 0</text>
    <text x="200" y="240" font-size="21" font-weight="600" fill="#111111">Initial Access  ·  8 parallel delivery vectors</text>
    <text x="80" y="290" font-size="20" fill="#ffffff">Any one vector triggers the same downstream loader chain:</text>
    <text x="80" y="328" font-size="18" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.url  ·  .lnk  ·  .scr / .msi (RTLO)  ·  macro Office  ·  .xll</text>
    <text x="80" y="360" font-size="18" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.msc (GrimResource)  ·  .hta / .mht / .mhtml POCs  ·  fake-PDF .exe</text>
  </g>
  <line x1="500" y1="390" x2="500" y2="430" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 1 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="436" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="436" width="880" height="42" rx="8" fill="#eab308"/>
    <rect x="60" y="466" width="880" height="12" fill="#eab308"/>
    <text x="80" y="466" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 1</text>
    <text x="200" y="466" font-size="21" font-weight="600" fill="#111111">SFX Wrapper  ·  Carriers.exe (Inno Setup 6.5+, 6.3 MB)</text>
    <text x="80" y="516" font-size="20" fill="#ffffff">Pascal Script anti-triage:</text>
    <text x="80" y="548" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">InitializeSetup() → ExtractTemporaryFile ×17 → WinExec → return False</text>
    <text x="80" y="580" font-size="18" fill="#e5e5e5">Installer aborts silently — no wizard, no [Run] section, payload already executing.</text>
    <text x="80" y="612" font-size="18" fill="#e5e5e5">AppName  Apophyge  ·  DefaultDirName  Veteran  ·  AppId {1F2952E4-…7DA7D2}</text>
  </g>
  <line x1="500" y1="636" x2="500" y2="676" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 2 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="682" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="682" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="712" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="712" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 2</text>
    <text x="200" y="712" font-size="21" font-weight="600" fill="#ffffff">Side-load Host  ·  CrystSupervisor32.exe (renamed Wondershare)</text>
    <text x="80" y="762" font-size="20" fill="#ffffff">Genuine signed Wondershare binary loads operator-modified <tspan font-weight="600">ExceptionHandler.dll</tspan></text>
    <text x="80" y="796" font-size="16" fill="#e5e5e5">PDB:  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">I:\CompanySource\Plowshare\Src\Symbol\Release\ExceptionHandler.pdb</tspan></text>
    <text x="80" y="828" font-size="17" fill="#e5e5e5">FUN_100024B0 = inline reflective loader</text>
    <text x="80" y="858" font-size="17" fill="#e5e5e5">(PEB-walk API resolution + relocation + memcpy stage-2 + jump)</text>
  </g>
  <line x1="500" y1="882" x2="500" y2="922" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 3 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="928" width="880" height="160" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="928" width="880" height="42" rx="8" fill="#58a6ff"/>
    <rect x="60" y="958" width="880" height="12" fill="#58a6ff"/>
    <text x="80" y="958" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 3</text>
    <text x="200" y="958" font-size="21" font-weight="600" fill="#111111">DLL Hollow #1  →  Windows tapisrv.dll  ·  EDR-quiet target</text>
    <text x="80" y="1008" font-size="20" fill="#ffffff">Reads <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">shadermgr93.rc</tspan> (27 KB operator config)</text>
    <text x="80" y="1040" font-size="18" fill="#e5e5e5">LoadLibrary(tapisrv) · VirtualProtect .text RWX</text>
    <text x="80" y="1072" font-size="18" fill="#e5e5e5">memcpy 5,808 bytes of stage-2 shellcode → call tapisrv .text + 0xED0</text>
  </g>
  <line x1="500" y1="1088" x2="500" y2="1128" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 4 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1134" width="880" height="240" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1134" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="1164" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="1164" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 4</text>
    <text x="200" y="1164" font-size="21" font-weight="600" fill="#ffffff">Stage-2 Shellcode  ·  5,808 bytes  ·  8-phase architecture</text>
    <text x="80" y="1214" font-size="20" fill="#ffffff">API hash table built (X65599 multiplier · 17 of 21 slots resolved)</text>
    <text x="80" y="1248" font-size="16" fill="#e5e5e5">Anti-sandbox quadruple: ZwQueryInformationProcess + ZwDelayExecution × 9</text>
    <text x="80" y="1274" font-size="16" fill="#e5e5e5">+ QueryPerformanceCounter + ZwQuerySystemInformation</text>
    <text x="80" y="1308" font-size="20" fill="#ffffff">Reads <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">networkspec17.log</tspan> (2.6 MB) → 3-layer decode:</text>
    <text x="80" y="1344" font-size="16" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">L1 PNG-IDAT walker → L2 XOR (key 0xE1D5B4A2) → L3 LZNT1 → 3.75 MB</text>
  </g>
  <line x1="500" y1="1374" x2="500" y2="1414" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 5 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1420" width="880" height="160" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1420" width="880" height="42" rx="8" fill="#58a6ff"/>
    <rect x="60" y="1450" width="880" height="12" fill="#58a6ff"/>
    <text x="80" y="1450" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 5</text>
    <text x="200" y="1450" font-size="21" font-weight="600" fill="#111111">DLL Hollow #2  →  Windows input.dll  ·  second EDR-quiet target</text>
    <text x="80" y="1500" font-size="20" fill="#ffffff">Reads target name from Layer-3 offset 0xf4:</text>
    <text x="80" y="1532" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">%windir%\SysWOW64\input.dll</text>
    <text x="80" y="1562" font-size="18" fill="#e5e5e5">LoadLibrary · VirtualProtect .text RWX · memcpy stage-3 bytes · call entry point</text>
  </g>
  <line x1="500" y1="1580" x2="500" y2="1620" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 6 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1626" width="880" height="270" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1626" width="880" height="42" rx="8" fill="#a855f7"/>
    <rect x="60" y="1656" width="880" height="12" fill="#a855f7"/>
    <text x="80" y="1656" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 6</text>
    <text x="200" y="1656" font-size="21" font-weight="600" fill="#111111">Stage-3 PE Bundle  ·  8 PEs  ·  multi-vendor camouflage upgrade</text>
    <text x="80" y="1706" font-size="18" fill="#ffffff">3.75 MB Layer-3 buffer holds 8 embedded PEs.</text>
    <text x="80" y="1732" font-size="18" fill="#ffffff">Operator hides 3 malicious PEs among 5 genuine signed binaries:</text>

    <!-- legit column -->
    <rect x="80" y="1756" width="418" height="124" rx="6" fill="#0a1f12" stroke="#4ade8040"/>
    <circle cx="98" cy="1778" r="5" fill="#4ade80"/>
    <text x="116" y="1784" font-size="16" font-weight="600" fill="#4ade80">5 GENUINE signed (camouflage)</text>
    <text x="116" y="1808" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_01  Crisp Squirrel</text>
    <text x="116" y="1830" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_02  Info-ZIP zip.exe v3.0</text>
    <text x="116" y="1852" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_04 / pe_05  Google Updater</text>
    <text x="116" y="1874" font-size="15" font-weight="600" fill="#4ade80" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_08  Qihoo PromoUtil → Stage 8</text>

    <!-- malicious column -->
    <rect x="506" y="1756" width="418" height="124" rx="6" fill="#1f0e0e" stroke="#f8717140"/>
    <circle cx="524" cy="1778" r="5" fill="#f87171"/>
    <text x="542" y="1784" font-size="16" font-weight="600" fill="#f87171">3 OPERATOR-controlled</text>
    <text x="542" y="1810" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_03  HijackLoader / Penguish</text>
    <text x="542" y="1835" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_06  Rugmi.HP GoProxy MITM</text>
    <text x="542" y="1860" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_07  bundle-cleanup helper</text>
  </g>
  <line x1="500" y1="1896" x2="500" y2="1936" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 7 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1942" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1942" width="880" height="42" rx="8" fill="#dc2626"/>
    <rect x="60" y="1972" width="880" height="12" fill="#dc2626"/>
    <text x="80" y="1972" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 7</text>
    <text x="200" y="1972" font-size="21" font-weight="600" fill="#ffffff">Per-host KDF  ·  pe_03 execution guardrail</text>
    <text x="80" y="2022" font-size="20" fill="#ffffff">Resolves <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">ntdll!RtlHashUnicodeString</tspan></text>
    <text x="80" y="2050" font-size="17" fill="#e5e5e5">(under-documented HijackLoader TTP — no readable hash function in pe_03)</text>
    <text x="80" y="2086" font-size="16" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">seed = X65599(GetComputerNameW())  XOR  0xa1b2d3b4</text>
    <text x="80" y="2110" font-size="16" fill="#e5e5e5">→ PRNG seed (env vars) AND payload decryption key</text>
    <text x="80" y="2134" font-size="17" fill="#e5e5e5">Resisted ~270 cipher recovery combinations.</text>
  </g>
  <line x1="500" y1="2142" x2="500" y2="2182" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 8 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2188" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2188" width="880" height="42" rx="8" fill="#58a6ff"/>
    <rect x="60" y="2218" width="880" height="12" fill="#58a6ff"/>
    <text x="80" y="2218" font-size="16" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 8</text>
    <text x="200" y="2218" font-size="21" font-weight="600" fill="#111111">WVault.exe Hollow  ·  cross-campaign TTP cluster (8+ campaigns)</text>
    <text x="80" y="2268" font-size="18" fill="#ffffff">Genuine Qihoo 360 PromoUtil (pe_08) dropped to:</text>
    <text x="80" y="2294" font-size="17" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">C:\ProgramData\WVault.exe</text>
    <text x="80" y="2326" font-size="17" fill="#e5e5e5">Parent CrystSupervisor32.exe exits → process orphaned</text>
    <text x="80" y="2352" font-size="16" fill="#e5e5e5">Process Explorer Threads tab shows  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">clr.dll!CreateAssemblyNameObject</tspan></text>
    <text x="80" y="2378" font-size="17" fill="#fb923c" font-weight="600">Detection: match the PATTERN (orphan signed Qihoo + CLR threads), not the hash.</text>
  </g>
  <line x1="500" y1="2388" x2="500" y2="2428" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 9 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2434" width="880" height="170" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2434" width="880" height="42" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2464" width="880" height="12" fill="#7f1d1d"/>
    <text x="80" y="2464" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 9</text>
    <text x="200" y="2464" font-size="21" font-weight="600" fill="#ffffff">Persistence + Defender Bypass + MITM Cert Install</text>
    <text x="80" y="2514" font-size="18" fill="#ffffff">Three concurrent persistence + bypass mechanisms:</text>
    <text x="80" y="2546" font-size="16" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">·  C:\Windows\Tasks\watchermgmt.job  (legacy .job autorunsc blind spot)</text>
    <text x="80" y="2574" font-size="16" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">·  Defender exclusion of drop dir  ·  GoProxy CA cert  0174E68C…2B61AFD</text>
  </g>
  <line x1="500" y1="2604" x2="500" y2="2644" stroke="#cccccc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 10 =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2650" width="880" height="200" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2650" width="880" height="42" rx="8" fill="#7f1d1d"/>
    <rect x="60" y="2680" width="880" height="12" fill="#7f1d1d"/>
    <text x="80" y="2680" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 10</text>
    <text x="200" y="2680" font-size="21" font-weight="600" fill="#ffffff">C2 Beacon  ·  TLSv1  ·  AsyncRAT-class .NET RAT</text>
    <text x="80" y="2730" font-size="18" fill="#ffffff">WVault.exe (PID 2596)  →  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace" font-weight="600">185.241.208[.]129:56167</tspan></text>
    <text x="80" y="2756" font-size="17" fill="#e5e5e5">Hardcoded IP, no DNS lookup.</text>
    <text x="80" y="2786" font-size="16" fill="#e5e5e5">JA3  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">07af4aa9e4d215a5ee63f9a0a277fbe3</tspan>  (Abuse.ch SSLBL → AsyncRAT)</text>
    <text x="80" y="2812" font-size="16" fill="#e5e5e5">JA4  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">t10i060500_4dc025c38c38_1a3805c3aa63</tspan></text>
    <text x="80" y="2842" font-size="17" fill="#fb923c" font-weight="600">Highest-value durable signal — JA3 persists across IP rotation; DNS detection useless.</text>
  </g>
</svg>
