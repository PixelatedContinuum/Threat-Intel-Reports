<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1000" height="2320" fill="#161616"/>
  <rect x="0.5" y="0.5" width="999" height="2319" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== TITLE =========== -->
  <text x="500" y="48" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">Kill Chain Overview</text>
  <text x="500" y="80" text-anchor="middle" font-size="20" fill="#f5f5f5">HijackLoader / Penguish / Rugmi  →  AsyncRAT-class .NET RAT</text>
  <text x="500" y="108" text-anchor="middle" font-size="14" fill="#cccccc">Primary sample: Carriers.exe  ·  Staging 62.60.237[.]100 (AS210644 AEZA, OFAC SDN)  ·  C2 185.241.208[.]129:56167 (AS210558 1337 Services, Spamhaus DROP)</text>
  <line x1="60" y1="130" x2="940" y2="130" stroke="#2a2a2a" stroke-width="1"/>

  <!-- =========== STAGE 0 — INITIAL ACCESS =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="160" width="880" height="140" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="160" width="880" height="34" rx="6" fill="#f97316"/>
    <rect x="60" y="186" width="880" height="8" fill="#f97316"/>
    <text x="78" y="184" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 0</text>
    <text x="180" y="184" font-size="17" font-weight="600" fill="#111111">Initial Access  ·  8 parallel delivery vectors</text>
    <text x="78" y="226" font-size="16" fill="#ffffff">Any one vector triggers the same downstream loader chain:</text>
    <text x="78" y="256" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.url  ·  .lnk  ·  .scr / .msi (RTLO)  ·  macro Office  ·  .xll  ·  .msc (GrimResource)</text>
    <text x="78" y="284" font-size="15" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">.hta / .mht / .mhtml POCs  ·  fake-PDF .exe (long-timestamp filename)</text>
  </g>
  <line x1="500" y1="300" x2="500" y2="334" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 1 — SFX WRAPPER =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="338" width="880" height="150" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="338" width="880" height="34" rx="6" fill="#eab308"/>
    <rect x="60" y="364" width="880" height="8" fill="#eab308"/>
    <text x="78" y="362" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 1</text>
    <text x="180" y="362" font-size="17" font-weight="600" fill="#111111">SFX Wrapper  ·  Carriers.exe (Inno Setup 6.5+, 6.3 MB)</text>
    <text x="78" y="404" font-size="16" fill="#ffffff">Pascal Script anti-triage:  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">InitializeSetup() → ExtractTemporaryFile ×17 → WinExec → return False</tspan></text>
    <text x="78" y="432" font-size="15" fill="#e5e5e5">Installer aborts silently with no wizard, no [Run] section, payload already executing.</text>
    <text x="78" y="460" font-size="15" fill="#e5e5e5">AppName  Apophyge  ·  DefaultDirName  Veteran  ·  AppId  {1F2952E4-…7DA7D2}</text>
  </g>
  <line x1="500" y1="488" x2="500" y2="522" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 2 — SIDE-LOAD HOST =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="526" width="880" height="150" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="526" width="880" height="34" rx="6" fill="#dc2626"/>
    <rect x="60" y="552" width="880" height="8" fill="#dc2626"/>
    <text x="78" y="550" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 2</text>
    <text x="180" y="550" font-size="17" font-weight="600" fill="#ffffff">Side-load Host  ·  CrystSupervisor32.exe (renamed Wondershare SlideShowEditor.exe)</text>
    <text x="78" y="592" font-size="16" fill="#ffffff">Genuine signed Wondershare binary loads operator-modified  <tspan font-weight="600">ExceptionHandler.dll</tspan></text>
    <text x="78" y="620" font-size="14" fill="#e5e5e5">PDB:  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">I:\CompanySource\Plowshare\Src\Symbol\Release\ExceptionHandler.pdb</tspan></text>
    <text x="78" y="648" font-size="14" fill="#e5e5e5">FUN_100024B0 = inline reflective loader (PEB-walk API resolution + relocation + memcpy + jump)</text>
  </g>
  <line x1="500" y1="676" x2="500" y2="710" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 3 — HOLLOW #1 INTO tapisrv.dll =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="714" width="880" height="120" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="714" width="880" height="34" rx="6" fill="#58a6ff"/>
    <rect x="60" y="740" width="880" height="8" fill="#58a6ff"/>
    <text x="78" y="738" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 3</text>
    <text x="180" y="738" font-size="17" font-weight="600" fill="#111111">DLL Hollow #1  →  Windows tapisrv.dll  ·  EDR-quiet target</text>
    <text x="78" y="780" font-size="16" fill="#ffffff">Reads <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">shadermgr93.rc</tspan> (27 KB operator config) · LoadLibrary(tapisrv) · VirtualProtect .text RWX</text>
    <text x="78" y="810" font-size="15" fill="#e5e5e5">memcpy 5,808 bytes of stage-2 shellcode into tapisrv .text → call tapisrv .text + 0xED0</text>
  </g>
  <line x1="500" y1="834" x2="500" y2="868" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 4 — STAGE-2 SHELLCODE =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="872" width="880" height="180" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="872" width="880" height="34" rx="6" fill="#dc2626"/>
    <rect x="60" y="898" width="880" height="8" fill="#dc2626"/>
    <text x="78" y="896" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 4</text>
    <text x="180" y="896" font-size="17" font-weight="600" fill="#ffffff">Stage-2 Shellcode  ·  5,808 bytes  ·  8-phase architecture</text>
    <text x="78" y="938" font-size="16" fill="#ffffff">API hash table built (X65599 multiplier · 17 of 21 slots resolved)</text>
    <text x="78" y="966" font-size="14" fill="#e5e5e5">Anti-sandbox quadruple: ZwQueryInformationProcess + ZwDelayExecution × 9 + QueryPerformanceCounter + ZwQuerySystemInformation</text>
    <text x="78" y="996" font-size="16" fill="#ffffff">Reads <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">networkspec17.log</tspan> (2.6 MB) → 3-layer decode:</text>
    <text x="78" y="1026" font-size="14" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">L1 PNG-IDAT chunk walker  →  L2 4-byte XOR (key 0xE1D5B4A2)  →  L3 LZNT1 chunked  →  3.75 MB</text>
  </g>
  <line x1="500" y1="1052" x2="500" y2="1086" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 5 — HOLLOW #2 INTO input.dll =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1090" width="880" height="120" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1090" width="880" height="34" rx="6" fill="#58a6ff"/>
    <rect x="60" y="1116" width="880" height="8" fill="#58a6ff"/>
    <text x="78" y="1114" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 5</text>
    <text x="180" y="1114" font-size="17" font-weight="600" fill="#111111">DLL Hollow #2  →  Windows input.dll  ·  second EDR-quiet target</text>
    <text x="78" y="1156" font-size="16" fill="#ffffff">Reads target name from Layer-3 offset 0xf4: <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">%windir%\SysWOW64\input.dll</tspan></text>
    <text x="78" y="1186" font-size="15" fill="#e5e5e5">LoadLibrary(input.dll) · VirtualProtect .text RWX · memcpy stage-3 bytes · call entry point</text>
  </g>
  <line x1="500" y1="1210" x2="500" y2="1244" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 6 — STAGE-3 PE BUNDLE =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1248" width="880" height="200" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1248" width="880" height="34" rx="6" fill="#a855f7"/>
    <rect x="60" y="1274" width="880" height="8" fill="#a855f7"/>
    <text x="78" y="1272" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 6</text>
    <text x="180" y="1272" font-size="17" font-weight="600" fill="#111111">Stage-3 PE Bundle  ·  8 PEs  ·  multi-vendor camouflage upgrade</text>
    <text x="78" y="1314" font-size="15" fill="#ffffff">3.75 MB Layer-3 buffer contains 8 embedded PE files. Operator hides 3 malicious PEs among 5 genuine signed binaries:</text>

    <!-- legit column -->
    <rect x="78" y="1334" width="418" height="100" rx="4" fill="#0a1f12" stroke="#4ade8040"/>
    <circle cx="92" cy="1352" r="4" fill="#4ade80"/>
    <text x="106" y="1357" font-size="14" font-weight="600" fill="#4ade80">5 GENUINE signed (camouflage)</text>
    <text x="106" y="1378" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_01  Crisp Squirrel StubExecutable</text>
    <text x="106" y="1398" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_02  Info-ZIP zip.exe v3.0</text>
    <text x="106" y="1418" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_04  Google Updater stub  ·  pe_05  component</text>
    <text x="106" y="1432" font-size="13" font-weight="600" fill="#4ade80" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_08  Qihoo 360 PromoUtil.exe → Stage 8 host</text>

    <!-- malicious column -->
    <rect x="504" y="1334" width="418" height="100" rx="4" fill="#1f0e0e" stroke="#f8717140"/>
    <circle cx="518" cy="1352" r="4" fill="#f87171"/>
    <text x="532" y="1357" font-size="14" font-weight="600" fill="#f87171">3 OPERATOR-controlled</text>
    <text x="532" y="1378" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_03  HijackLoader / Penguish / Rugmi PROPER</text>
    <text x="532" y="1398" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_06  Rugmi.HP GoProxy MITM CA installer</text>
    <text x="532" y="1418" font-size="13" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">pe_07  bundle-cleanup helper (campaign-unique)</text>
  </g>
  <line x1="500" y1="1448" x2="500" y2="1482" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 7 — PER-HOST KDF =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1486" width="880" height="150" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1486" width="880" height="34" rx="6" fill="#dc2626"/>
    <rect x="60" y="1512" width="880" height="8" fill="#dc2626"/>
    <text x="78" y="1510" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 7</text>
    <text x="180" y="1510" font-size="17" font-weight="600" fill="#ffffff">Per-host KDF  ·  pe_03 (HijackLoader proper) execution guardrail</text>
    <text x="78" y="1552" font-size="16" fill="#ffffff">Resolves <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">ntdll!RtlHashUnicodeString</tspan>  (under-documented HijackLoader TTP)</text>
    <text x="78" y="1582" font-size="14" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">seed = X65599(GetComputerNameW())  XOR  0xa1b2d3b4   →   PRNG seed AND payload decryption key</text>
    <text x="78" y="1610" font-size="15" fill="#e5e5e5">Resisted ~270 cipher recovery combinations — above commodity AsyncRAT/DCRat sophistication.</text>
  </g>
  <line x1="500" y1="1636" x2="500" y2="1670" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 8 — WVAULT HOLLOW =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1674" width="880" height="150" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1674" width="880" height="34" rx="6" fill="#58a6ff"/>
    <rect x="60" y="1700" width="880" height="8" fill="#58a6ff"/>
    <text x="78" y="1698" font-size="13" font-weight="700" fill="#111111" letter-spacing="0.5">STAGE 8</text>
    <text x="180" y="1698" font-size="17" font-weight="600" fill="#111111">WVault.exe Hollow  ·  cross-campaign TTP cluster (8+ campaigns since 2025)</text>
    <text x="78" y="1740" font-size="16" fill="#ffffff">Genuine Qihoo 360 PromoUtil.exe (pe_08) dropped to <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">C:\ProgramData\WVault.exe</tspan>  ·  parent exits</text>
    <text x="78" y="1770" font-size="14" fill="#e5e5e5">Process orphaned · Process Explorer Threads tab shows  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">clr.dll!CreateAssemblyNameObject</tspan>  +  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">GetIdentityAuthority</tspan></text>
    <text x="78" y="1800" font-size="15" fill="#fb923c" font-weight="600">Detection signal: defenders should match the PATTERN (orphan signed Qihoo binary + CLR threads), not the specific hash.</text>
  </g>
  <line x1="500" y1="1824" x2="500" y2="1858" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 9 — PERSISTENCE =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="1862" width="880" height="140" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="1862" width="880" height="34" rx="6" fill="#7f1d1d"/>
    <rect x="60" y="1888" width="880" height="8" fill="#7f1d1d"/>
    <text x="78" y="1886" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 9</text>
    <text x="180" y="1886" font-size="17" font-weight="600" fill="#ffffff">Persistence + Defender Bypass + MITM Cert Install</text>
    <text x="78" y="1928" font-size="16" fill="#ffffff">Three concurrent persistence + bypass mechanisms:</text>
    <text x="78" y="1956" font-size="14" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">·  C:\Windows\Tasks\watchermgmt.job   (legacy .job format · autorunsc enumeration blind spot)</text>
    <text x="78" y="1980" font-size="14" fill="#e5e5e5" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">·  HKLM\…\Defender\Exclusions\Paths   ·   GoProxy CA cert  0174E68C…2B61AFD</text>
  </g>
  <line x1="500" y1="2002" x2="500" y2="2036" stroke="#cccccc" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- =========== STAGE 10 — C2 BEACON =========== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="2040" width="880" height="160" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="60" y="2040" width="880" height="34" rx="6" fill="#7f1d1d"/>
    <rect x="60" y="2066" width="880" height="8" fill="#7f1d1d"/>
    <text x="78" y="2064" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">STAGE 10</text>
    <text x="180" y="2064" font-size="17" font-weight="600" fill="#ffffff">C2 Beacon  ·  TLSv1  ·  AsyncRAT-class .NET RAT</text>
    <text x="78" y="2106" font-size="16" fill="#ffffff">WVault.exe (PID 2596)  →  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace" font-weight="600">185.241.208[.]129:56167</tspan>  ·  hardcoded IP, no DNS lookup</text>
    <text x="78" y="2134" font-size="14" fill="#e5e5e5">JA3  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">07af4aa9e4d215a5ee63f9a0a277fbe3</tspan>  (Abuse.ch SSLBL → AsyncRAT JA3)</text>
    <text x="78" y="2160" font-size="14" fill="#e5e5e5">JA4  <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">t10i060500_4dc025c38c38_1a3805c3aa63</tspan>  ·  ClientHello cipher list 49162-49161-49172-49171-53-47</text>
    <text x="78" y="2186" font-size="15" fill="#fb923c" font-weight="600">Highest-value durable signal: JA3 + ClientHello fingerprint persists across IP rotation; DNS-based detection useless.</text>
  </g>

  <!-- =========== TIMING FOOTER =========== -->
  <line x1="60" y1="2230" x2="940" y2="2230" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="2260" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">Total time from sample launch to first C2 beacon  ≈  43 seconds</text>
  <text x="500" y="2286" text-anchor="middle" font-size="14" fill="#e5e5e5">File-based blocking must act inside this window  ·  otherwise behavioral detection at Stage 8 (orphan WVault.exe + CLR threads) is required</text>
  <text x="500" y="2310" text-anchor="middle" font-size="13" fill="#cccccc">Color legend  —  orange: initial access · yellow: dropper · red: operator loader · blue: hollowed Windows DLL · purple: PE bundle · deep red: persistence + C2</text>
</svg>
