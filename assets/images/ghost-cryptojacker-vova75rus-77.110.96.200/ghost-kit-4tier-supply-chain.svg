  <text x="500" y="106" text-anchor="middle" font-size="24" fill="#f5f5f5">UnamSanctam OSS upstream → Vova75Rus kit-author → 3 customer operators</text>
  <text x="500" y="140" text-anchor="middle" font-size="18" fill="#cccccc">Tier-0 GitHub T&amp;S action 2026-05-25 disrupted the entire downstream ecosystem in one intervention</text>
  <line x1="60" y1="166" x2="940" y2="166" stroke="#2a2a2a" stroke-width="1"/>

