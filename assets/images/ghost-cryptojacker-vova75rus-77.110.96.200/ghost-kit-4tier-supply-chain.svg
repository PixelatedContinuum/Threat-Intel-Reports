  <text x="500" y="1260" text-anchor="middle" font-size="14" fill="#888888">UnamSanctam = upstream OSS author; not a Case 9 threat actor. Vova75Rus is the named threat actor (HIGH 88%).</text>
  <text x="500" y="1286" text-anchor="middle" font-size="14" fill="#888888">Censys ARC (Mark Ellzey, 2026-04-07) independently corroborates the kit-author identity via cross-customer .so SHA-256 match.</text>
