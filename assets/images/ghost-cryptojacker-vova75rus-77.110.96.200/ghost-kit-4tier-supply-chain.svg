    <rect x="160" y="356" width="6" height="220" rx="3" fill="#dc2626"/>
    <text x="180" y="386" font-size="14" font-weight="600" fill="#cccccc" letter-spacing="0.5">TIER 2 — KIT AUTHOR (★ INTERVENTION POINT)</text>
    <text x="180" y="416" font-size="22" font-weight="700" fill="#ffffff"><tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">Vova75Rus</tspan>  ·  GitHub UID <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">73169104</tspan>  ·  HIGH 88% NAMED ACTOR</text>
    <text x="180" y="446" font-size="17" fill="#e5e5e5">Russian native · region code 75 = Zabaykalsky Krai indicator · 5+ year GitHub history (since 2020-10-20)</text>
    <text x="180" y="472" font-size="17" fill="#e5e5e5">Assembles GHOST kit: <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">ghost.sh</tspan> + <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">libpam_cache.so</tspan> + Python ComfyUI exploitation framework</text>
    <text x="180" y="498" font-size="17" fill="#e5e5e5">OWNER Telegram bot <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">8415540095:...</tspan> baked into every customer deployment ← supply-chain monitoring signature</text>
    <text x="180" y="526" font-size="17" fill="#e5e5e5">Same <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">libpam_cache.so</tspan> SHA-256 (<tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">eaaa10c8...</tspan>) shipped byte-identical to ALL 3 customers below</text>
    <text x="180" y="556" font-size="17" fill="#fb923c" font-weight="700">✓ ACCOUNT SUSPENDED by GitHub T&amp;S 2026-05-25  ·  9 URLs return HTTP 404  ·  upstream payload channel removed</text>
  </g>

