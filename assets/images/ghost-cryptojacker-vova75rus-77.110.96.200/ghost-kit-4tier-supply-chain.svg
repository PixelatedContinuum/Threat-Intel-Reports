    <text x="220" y="284" font-size="17" fill="#e5e5e5">860 followers · supplies <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">UnamWebPanel</tspan> + <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">SilentCryptoMiner</tspan> as free OSS</text>
    <text x="220" y="308" font-size="15" fill="#888888">Passive upstream — NOT a Case 9 threat actor; Vova75Rus pulls + repackages without attribution back</text>
  </g>
  <line x1="500" y1="326" x2="500" y2="356" stroke="#666666" stroke-width="2"/>

