  <!-- =========== FOOTER =========== -->
  <line x1="60" y1="1058" x2="940" y2="1058" stroke="#2a2a2a" stroke-width="1"/>
  <text x="500" y="1090" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Highest-value detection anchors: OWNER bot prefix <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">8415540095</tspan> (catches ALL customer kits)</text>
  <text x="500" y="1116" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">+ byte-identical libpam_cache.so SHA-256 <tspan font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace">eaaa10c8...</tspan> (cross-customer rootkit)</text>
