<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <!--
    GHOST cryptojacker kit — 4-tier supply chain (Case 9 / UTA-2026-014 → Vova75Rus → operators)
    Adapted process-tree: 2-deep chain (UnamSanctam → Vova75Rus) + 3-way Y-branch (3 customer operators).
  -->
  <defs>
    <filter id="treeShadow" x="-2%" y="-2%" width="104%" height="108%">
